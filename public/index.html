<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Link Converter</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Project Link Converter</h1>
    <p>Enter a project URL or number below:</p>
    <input type="text" id="projectInput" placeholder="Enter project URL or number..." />
    <button id="convertButton">Convert</button>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Processing...</p>
    </div>
    <div class="output" id="output"></div>
    <div class="map-preview" id="mapPreview" style="display: none;">
      <iframe id="mapFrame" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" style="width:100%" height="320"></iframe>
    </div>
  </div>
  <footer>&copy; 2025 Project Converter Tool</footer>
  <script src="script.js"></script>
</body>
</html>
