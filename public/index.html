<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Link Converter</title>
  <style>
    /* General Styles */
    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f7f9;
      color: #333;
    }

    /* Centering Content */
    .container {
      max-width: 600px;
      margin: 50px auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      padding: 20px;
      text-align: center;
    }

    /* Header */
    h1 {
      font-size: 24px;
      color: #2d89ef;
      margin-bottom: 20px;
    }

    p {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    /* Input Field */
    input[type="text"] {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-bottom: 20px;
      box-sizing: border-box;
      transition: border-color 0.2s ease-in-out;
    }

    input[type="text"]:focus {
      border-color: #2d89ef;
      outline: none;
    }

    /* Button */
    button {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      background-color: #2d89ef;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #1b5bbf;
    }

    /* Loading Spinner */
    .loading {
      display: none;
      margin: 20px 0;
      text-align: center;
    }

    .spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid #2d89ef;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Output */
    .output {
      margin-top: 20px;
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ddd;
      text-align: left;
    }

    .output p {
      margin: 0 0 10px;
      font-size: 14px;
      color: #444;
    }

    .output a {
      display: inline-block;
      color: #2d89ef;
      text-decoration: none;
      word-break: break-word;
    }

    .output a:hover {
      text-decoration: underline;
    }

    /* Map Preview */
    .map-preview {
      margin-top: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
      height: 300px;
    }

    /* Footer */
    footer {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Project Link Converter</h1>
    <p>Enter a project URL or number below:</p>
    <input type="text" id="projectInput" placeholder="Enter project URL or number..." />
    <button id="convertButton">Convert</button>
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Processing...</p>
    </div>
    <div class="output" id="output"></div>
    <div class="map-preview" id="mapPreview" style="display: none;">
      <iframe
        id="mapFrame"
        src=""
        width="100%"
        height="100%"
        style="border: 0;"
        allowfullscreen=""
        loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </div>
  <footer>&copy; 2025 Project Converter Tool</footer>
  <script>
    // פונקציה שמתחילה את תהליך החיפוש
    const startConversion = async () => {
      const projectInput = document.getElementById("projectInput").value.trim();

      if (!projectInput) {
        alert("Please enter a valid URL or project number.");
        return;
      }

      // Display loading spinner
      const loadingDiv = document.getElementById("loading");
      const outputDiv = document.getElementById("output");
      const mapPreviewDiv = document.getElementById("mapPreview");
      const mapFrame = document.getElementById("mapFrame");
      loadingDiv.style.display = "block";
      outputDiv.innerHTML = "";
      mapPreviewDiv.style.display = "none";

      try {
        const response = await fetch("/convert", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ projectInput }),
        });

        const data = await response.json();

        if (data.googleMapsUrl && data.updatedUrl) {
          outputDiv.innerHTML = `
            <p><strong>Updated URL:</strong></p>
            <a href="${data.updatedUrl}" target="_blank">${data.updatedUrl}</a>
            <p><strong>Google Maps URL:</strong></p>
            <a href="${data.googleMapsUrl}" target="_blank">${data.googleMapsUrl}</a>
          `;

          // Update map preview
          mapFrame.src = data.googleMapsUrl;
          mapPreviewDiv.style.display = "block";
        } else {
          outputDiv.innerHTML = `<p>Error: ${data.error}</p>`;
        }
      } catch (error) {
        console.error("Error:", error);
        outputDiv.innerHTML = `<p>An error occurred.</p>`;
      } finally {
        loadingDiv.style.display = "none"; // Hide loading spinner after completion
      }
    };

    // לחיצה על כפתור ההמרה
    document.getElementById("convertButton").addEventListener("click", startConversion);

    // לחיצה על Enter בתיבת הטקסט
    document.getElementById("projectInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        startConversion();
      }
    });
  </script>
</body>
</html>
