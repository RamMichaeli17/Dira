<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Link Converter</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h1></h1>

    <div class="language-switcher">
      <div class="custom-select">
        <div class="select-trigger">
          <img src="" alt="" class="flag-icon" />
          <span class="selected-text"></span>
          <span class="arrow"></span>
        </div>
        <div class="select-dropdown">
          <div class="select-option" data-value="he">
            <img src="israel-flag.png" alt="Israel Flag" class="flag-icon" />
            <span>עברית</span>
          </div>
          <div class="select-option" data-value="en">
            <img src="usa-flag.png" alt="USA Flag" class="flag-icon" />
            <span>English</span>
          </div>
        </div>
      </div>
    </div>

    <p id="inputLabel"></p>
    <input type="text" id="projectInput" placeholder="" />

    <div class="button-container">
      <button id="convertButton"></button>
      <div class="cooldown-progress"></div>
    </div>
    <button id="cancelButton" style="display: none;"></button>

    <div class="loading" id="loading" style="display: none;">
      <div class="spinner"></div>
      <p id="processingText"></p>
    </div>

    <div id="queueStatus" class="queue-status" style="display: none;">
      <div class="queue-info">
        <div class="queue-position">
          <span class="position-number">1</span>
          <span class="position-text" id="queuePositionText"></span>
        </div>
        <div class="queue-time">
          <span id="estimatedWaitText"></span>

          < 1 minute </div>
            <div class="queue-progress-bar">
              <div class="progress-fill"></div>
            </div>
            <div class="queue-details">
              <div class="total-requests">
                <span id="totalRequestsText"></span> <span class="requests-number">1</span>
              </div>
            </div>
        </div>
      </div>

      <div id="output" class="output"></div>

      <div class="ai-button-container" style="text-align: center; margin: 15px 0;">
        <button id="aiInsightBtn" class="ai-btn" style="display: none;">
        </button>
      </div>

      <div class="maps-container">
        <div id="mapPreview" class="map-section" style="display: none;">
          <div class="map-heading">
            <strong></strong>
            <a href="" target="_blank" class="map-link"></a>
          </div>
          <div class="map-container">
            <iframe id="govMapFrame" frameborder="0" scrolling="no" marginheight="0" marginwidth="0"></iframe>
          </div>
        </div>

        <div id="googleMapPreview" class="map-section" style="display: none;">
          <div class="map-heading">
            <strong></strong>
            <a href="" target="_blank" class="map-link"></a>
          </div>
          <div class="map-container">
            <iframe id="googleMapFrame" frameborder="0" scrolling="no" marginheight="0" marginwidth="0"></iframe>
          </div>
        </div>
      </div>
    </div>

    <footer></footer>

    <div id="aiModal" class="ai-modal" style="display: none;">
      <div class="ai-modal-content">
        <span class="close-ai-btn">&times;</span>

        <div class="ai-modal-header">
          <h3 id="aiModalTitle"></h3>
          <p id="aiModalSubtitle"></p>
        </div>

        <div id="aiLoader" class="ai-loader" style="display: none;">
          <div class="spinner"></div>
          <p id="aiLoaderText"></p>
        </div>

        <div id="aiResults" class="ai-results" style="display: none;">
        </div>
      </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
